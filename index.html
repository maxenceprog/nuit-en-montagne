<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <title>Nuit en montagne</title>

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google-site-verification" content="eOSzBPs1SAZlsm3AO4JedErXj-fic31MCiEuNkhRj94" />

</head>

<body>
  <div id="main">
    <div id="map" role="region" aria-label="Carte des refuges"></div>

    <div id="sidebar">
      <div id="sidebar-content">
        <div>
          <label id="date" for="date-picker">Disponibilité pour le :</label>
          <input type="date" id="date-picker" aria-label="Date de disponibilité" />
        </div>
        <div id="info-panel" aria-live="polite">
          <h1>⛰️🛖⛰️</h1>
          <h1>Bienvenue</h1>
          <p>Ceci est un projet expérimental pour simplifier les réservations de refuge sur le site du <a
              href="https://www.ffcam.fr/rechercher_refuge_chalet.html"> FFCAM</a>.</p>
          <p>Les infos sont mises à jour tous les jours à 8h et 18h en été (7h et 17h en hiver).</p>
          <p>Retrouvez le code de mon projet ici : <a href="https://github.com/maxenceprog/nuit-en-montagne"> github</a>
          </p>
        </div>
        <div id="refuge-table" aria-label="Tableau des refuges"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
